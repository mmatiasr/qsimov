[pydoctor]
add-package = 
    qsimov
docformat = numpy
html-output = docs/
make-html = true
theme = readthedocs
project-name = qsimov
privacy =
    HIDDEN:qsimov.typing.T
    HIDDEN:qsimov.keras_qsimov_gradient.CustomConnectedDense.*
    HIDDEN:qsimov.pytorch_qsimov_gradient.CustomConnectedLinear.*
    HIDDEN:qsimov.keras_path_selector.suppress_tensorflow_warnings
    PRIVATE:qsimov.keras_path_selector.KerasLayerTypes
    PRIVATE:qsimov.pytorch_path_selector.PytorchLayerTypes
    PRIVATE:qsimov.*.*.__getstate__
    PRIVATE:qsimov.*.*.__setstate__
template-dir = pydoctor_utils/
intersphinx =
    https://docs.python.org/3/objects.inv
    https://pytorch.org/docs/master/objects.inv
    https://numpy.org/doc/stable/objects.inv
    https://github.com/GPflow/tensorflow-intersphinx/raw/master/tf2_py_objects.inv
html-writer = pydoctor_utils.template_writer.CustomTemplateWriter